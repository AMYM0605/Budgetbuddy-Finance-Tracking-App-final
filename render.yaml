    ##########
    services:
  # ─────────────────────────────────────────────
  # Backend – Spring Boot Web Service
  # ─────────────────────────────────────────────
  - type: web
    name: budget-buddy-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar

    envVars:
      - key: DB_URL
        value: jdbc:mysql://mainline.proxy.rlwy.net:28155/railway?useSSL=true&serverTimezone=UTC

      - key: DB_USERNAME
        value: root

      - key: DB_PASSWORD
        value: cYVZjqkUaVEPNyLabjBaTQSEYxjwmWdi

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRATION
        value: "86400000"

      - key: PORT
        value: "8080"

      - key: SPRING_PROFILES_ACTIVE
        value: prod


  # ─────────────────────────────────────────────
  # Frontend – React Static Site
  # ─────────────────────────────────────────────
  - type: web
    name: budget-buddy-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://budget-buddy-backend.onrender.com/api
