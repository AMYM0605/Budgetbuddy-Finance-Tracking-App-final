services:
  # ─────────────────────────────────────────────
  # Backend – Spring Boot Web Service
  # ─────────────────────────────────────────────
  - type: web
    name: budget-buddy-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/budget-buddy-backend-1.0.0.jar
    envVars:
      - key: DB_URL
        value: jdbc:mysql://<your-mysql-host>:3306/budget_buddy?createDatabaseIfNotExist=true&useSSL=true&serverTimezone=UTC
      - key: DB_USERNAME
        fromDatabase:
          name: budget-buddy-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: budget-buddy-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: PORT
        value: "8080"

